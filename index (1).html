<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Mie Ayam Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
        </div>
    </div>

    <!-- Firebase Setup & App Initialization -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy, where, serverTimestamp, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHJ4j_5-Km57HTH2YbcGlHShZJ_Pl0SMQ",
            authDomain: "landingpagemieayam.firebaseapp.com",
            projectId: "landingpagemieayam",
            storageBucket: "landingpagemieayam.firebasestorage.app",
            messagingSenderId: "321618987635",
            appId: "1:321618987635:web:29ab8e044e56505da43806",
            measurementId: "G-NMETPKTY5X"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.fb = { db, auth, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy, where, serverTimestamp, signInWithEmailAndPassword, onAuthStateChanged, signOut, getDocs, setDoc };
        
        // Ensure collections/settings exist
        async function initCollections() {
            try {
                const settingsRef = doc(db, 'settings', 'store');
                const settingsSnap = await getDocs(query(collection(db, 'settings')));
                if (settingsSnap.empty) {
                    await setDoc(settingsRef, {
                        storeName: "Mie Ayam Lezat",
                        whatsapp: "082254388144",
                        address: "Jl. Raya Mie Ayam No. 1",
                        openingHours: "08:00 - 22:00",
                        promoBanner: "Diskon 10% hari Jumat!",
                        isOpen: true
                    });
                }
            } catch (e) {
                console.error("Init Error:", e);
            }
        }
        initCollections();

        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Icons Component
        const Icon = ({ name, className }) => {
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            
            useEffect(() => {
                const handleFbLoad = () => setFbReady(true);
                window.addEventListener('firebaseLoaded', handleFbLoad);
                if (window.fb) setFbReady(true);
                return () => window.removeEventListener('firebaseLoaded', handleFbLoad);
            }, []);

            useEffect(() => {
                if (fbReady && window.fb) {
                    const unsubscribe = window.fb.onAuthStateChanged(window.fb.auth, (u) => {
                        setUser(u);
                    });
                    return () => unsubscribe();
                }
            }, [fbReady]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            if (!fbReady) return <div className="flex items-center justify-center min-h-screen"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>;

            if (!user) return <Login />;

            return <Dashboard user={user} />;
        }

        function Login() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await window.fb.signInWithEmailAndPassword(window.fb.auth, email, password);
                } catch (err) {
                    setError('Login gagal. Periksa email dan password.');
                }
                setLoading(false);
            };

            return (
                <div className="flex items-center justify-center min-h-screen bg-gray-100">
                    <div className="w-full max-w-md p-8 space-y-8 bg-white rounded-2xl shadow-xl">
                        <div className="text-center">
                            <h2 className="text-3xl font-extrabold text-gray-900">Admin Panel</h2>
                            <p className="mt-2 text-sm text-gray-600">Mie Ayam Dashboard</p>
                        </div>
                        <form className="mt-8 space-y-6" onSubmit={handleLogin}>
                            <div className="space-y-4 rounded-md shadow-sm">
                                <div>
                                    <label className="sr-only">Email address</label>
                                    <input type="email" required className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} />
                                </div>
                                <div>
                                    <label className="sr-only">Password</label>
                                    <input type="password" required className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} />
                                </div>
                            </div>
                            {error && <p className="text-sm text-red-600 text-center">{error}</p>}
                            <button type="submit" disabled={loading} className="w-full px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                {loading ? 'Loading...' : 'Sign In'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ user }) {
            const [view, setView] = useState('dashboard');
            const [orders, setOrders] = useState([]);
            const [menu, setMenu] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [settings, setSettings] = useState({});
            const [toastMessage, setToastMessage] = useState('');

            const { db, collection, onSnapshot, query, orderBy } = window.fb;

            useEffect(() => {
                let isInitialLoad = true;
                const unsubOrders = onSnapshot(query(collection(db, 'orders'), orderBy('createdAt', 'desc')), snap => {
                    setOrders(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    
                    if (!isInitialLoad) {
                        const newOrders = snap.docChanges().filter(change => change.type === 'added');
                        if (newOrders.length > 0) {
                            setToastMessage(`Ada pesanan baru masuk!`);
                            try {
                                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                                audio.play();
                            } catch(e) { console.error("Audio play failed"); }
                            
                            setTimeout(() => setToastMessage(''), 5000);
                        }
                    }
                    isInitialLoad = false;
                });

                const unsubMenu = onSnapshot(query(collection(db, 'menu'), orderBy('createdAt', 'desc')), snap => {
                    setMenu(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubTrans = onSnapshot(query(collection(db, 'transactions'), orderBy('createdAt', 'desc')), snap => {
                    setTransactions(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubSettings = onSnapshot(collection(db, 'settings'), snap => {
                    if(!snap.empty) {
                        snap.docs.forEach(doc => {
                            if(doc.id === 'store') setSettings({ id: doc.id, ...doc.data() });
                        });
                    }
                });

                return () => { unsubOrders(); unsubMenu(); unsubTrans(); unsubSettings(); };
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, toastMessage]);

            const handleLogout = () => window.fb.signOut(window.fb.auth);

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'orders', label: 'Pesanan Masuk', icon: 'shopping-bag' },
                { id: 'cashier', label: 'Mode Kasir', icon: 'calculator' },
                { id: 'menu', label: 'Manajemen Menu', icon: 'utensils' },
                { id: 'history', label: 'Riwayat Pesanan', icon: 'history' },
                { id: 'reports', label: 'Laporan', icon: 'bar-chart-3' },
                { id: 'settings', label: 'Pengaturan Toko', icon: 'settings' },
            ];

            return (
                <div className="flex h-screen overflow-hidden bg-gray-100 relative">
                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed top-6 right-6 bg-indigo-600 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center animate-bounce z-50 border border-indigo-400">
                            <Icon name="bell-ring" className="w-6 h-6 mr-3" />
                            <span className="font-bold text-lg">{toastMessage}</span>
                        </div>
                    )}

                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col">
                        <div className="h-16 flex items-center px-6 border-b border-gray-200">
                            <h1 className="text-xl font-bold text-indigo-600">Admin Panel</h1>
                        </div>
                        <nav className="flex-1 overflow-y-auto py-4">
                            <ul className="space-y-1 px-3">
                                {navItems.map(item => (
                                    <li key={item.id}>
                                        <button
                                            onClick={() => setView(item.id)}
                                            className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${view === item.id ? 'bg-indigo-50 text-indigo-700' : 'text-gray-700 hover:bg-gray-100'}`}
                                        >
                                            <Icon name={item.icon} className="w-5 h-5 mr-3" />
                                            {item.label}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </nav>
                        <div className="p-4 border-t border-gray-200">
                            <button onClick={handleLogout} className="w-full flex items-center px-3 py-2 text-sm font-medium text-red-600 rounded-lg hover:bg-red-50">
                                <Icon name="log-out" className="w-5 h-5 mr-3" />
                                Logout
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto">
                        <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
                            <h2 className="text-xl font-semibold text-gray-800 capitalize">{navItems.find(i => i.id === view)?.label}</h2>
                            <div className="flex items-center space-x-4">
                                <span className={`px-3 py-1 rounded-full text-xs font-medium ${settings.isOpen ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                    Toko {settings.isOpen ? 'Buka' : 'Tutup'}
                                </span>
                            </div>
                        </header>
                        <div className="p-8">
                            {view === 'dashboard' && <DashboardHome orders={orders} transactions={transactions} />}
                            {view === 'orders' && <OrdersView orders={orders} />}
                            {view === 'cashier' && <CashierView menu={menu} />}
                            {view === 'menu' && <MenuView menu={menu} />}
                            {view === 'history' && <HistoryView orders={orders} transactions={transactions} />}
                            {view === 'reports' && <ReportsView transactions={transactions} orders={orders} />}
                            {view === 'settings' && <SettingsView settings={settings} />}
                        </div>
                    </main>
                </div>
            );
        }

        // Sub-Views
        function DashboardHome({ orders, transactions }) {
            const today = new Date().toDateString();
            const isToday = (dateObj) => dateObj && new Date(dateObj.toDate()).toDateString() === today;

            const todayOrders = orders.filter(o => isToday(o.createdAt));
            const todayTrans = transactions.filter(t => isToday(t.createdAt));
            
            const pendingOrders = orders.filter(o => o.status === 'menunggu').length;
            const completedOrders = orders.filter(o => o.status === 'selesai').length;
            
            const completedOnlineToday = todayOrders.filter(o => o.status === 'selesai');
            const totalRevenue = todayTrans.reduce((sum, t) => sum + (t.total || 0), 0) + completedOnlineToday.reduce((sum, o) => sum + (o.total || 0), 0);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Pesanan Hari Ini" value={todayOrders.length + todayTrans.length} icon="shopping-cart" color="bg-blue-500" />
                        <StatCard title="Pendapatan Hari Ini" value={`Rp ${totalRevenue.toLocaleString()}`} icon="dollar-sign" color="bg-green-500" />
                        <StatCard title="Menunggu Konfirmasi" value={pendingOrders} icon="clock" color="bg-yellow-500" />
                        <StatCard title="Pesanan Selesai" value={completedOrders} icon="check-circle" color="bg-indigo-500" />
                    </div>
                </div>
            );
        }

        function StatCard({ title, value, icon, color }) {
            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center space-x-4">
                    <div className={`p-3 rounded-lg ${color} text-white`}>
                        <Icon name={icon} className="w-6 h-6" />
                    </div>
                    <div>
                        <p className="text-sm font-medium text-gray-500">{title}</p>
                        <h3 className="text-2xl font-bold text-gray-900">{value}</h3>
                    </div>
                </div>
            );
        }

        function OrdersView({ orders }) {
            const activeOrders = orders.filter(o => ['menunggu', 'diterima', 'diproses'].includes(o.status));
            const { db, doc, updateDoc } = window.fb;

            const updateStatus = async (id, status) => {
                await updateDoc(doc(db, 'orders', id), { status });
            };

            return (
                <div className="space-y-6">
                    {activeOrders.length === 0 ? (
                        <div className="text-center py-12 bg-white rounded-xl border border-gray-200">
                            <p className="text-gray-500">Tidak ada pesanan aktif saat ini.</p>
                        </div>
                    ) : (
                        <div className="grid gap-6">
                            {activeOrders.map(order => (
                                <div key={order.id} className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col md:flex-row justify-between gap-4">
                                    <div>
                                        <div className="flex items-center space-x-3 mb-2">
                                            <h3 className="text-lg font-bold text-gray-900">{order.customerName}</h3>
                                            <span className="px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800 uppercase">{order.status}</span>
                                        </div>
                                        <p className="text-sm text-gray-600 mb-1"><Icon name="phone" className="w-4 h-4 inline mr-1"/> {order.whatsapp}</p>
                                        <p className="text-sm text-gray-600 mb-3"><Icon name="map-pin" className="w-4 h-4 inline mr-1"/> {order.address}</p>
                                        <div className="bg-gray-50 p-3 rounded-lg text-sm">
                                            <ul className="list-disc list-inside text-gray-700">
                                                {order.items?.map((item, idx) => (
                                                    <li key={idx}>{item.qty}x {item.name} - Rp {(item.price * item.qty).toLocaleString()}</li>
                                                ))}
                                            </ul>
                                            <p className="mt-2 font-bold text-gray-900">Total: Rp {order.total?.toLocaleString()}</p>
                                            {order.notes && <p className="mt-2 text-xs text-gray-500 italic">Catatan: {order.notes}</p>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col space-y-2 min-w-[150px]">
                                        {order.status === 'menunggu' && (
                                            <>
                                                <button onClick={() => updateStatus(order.id, 'diterima')} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium">Terima</button>
                                                <button onClick={() => updateStatus(order.id, 'ditolak')} className="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 text-sm font-medium">Tolak</button>
                                            </>
                                        )}
                                        {order.status === 'diterima' && (
                                            <button onClick={() => updateStatus(order.id, 'diproses')} className="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 text-sm font-medium">Proses</button>
                                        )}
                                        {order.status === 'diproses' && (
                                            <button onClick={() => updateStatus(order.id, 'selesai')} className="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 text-sm font-medium">Selesai</button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function CashierView({ menu }) {
            const [cart, setCart] = useState([]);
            const { db, collection, addDoc, serverTimestamp } = window.fb;

            const addToCart = (item) => {
                const existing = cart.find(i => i.id === item.id);
                if (existing) {
                    setCart(cart.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i));
                } else {
                    setCart([...cart, { ...item, qty: 1 }]);
                }
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(i => i.id !== id));
            };

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            const handleCheckout = async () => {
                if (cart.length === 0) return;
                await addDoc(collection(db, 'transactions'), {
                    items: cart,
                    total: total,
                    method: 'cash',
                    cashier: 'Admin',
                    createdAt: serverTimestamp()
                });
                setCart([]);
                alert('Transaksi Berhasil Disimpan!');
            };

            return (
                <div className="flex flex-col lg:flex-row gap-6 h-[calc(100vh-8rem)]">
                    <div className="flex-1 overflow-y-auto hide-scrollbar">
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                            {menu.filter(m => m.isAvailable).map(item => (
                                <div key={item.id} onClick={() => addToCart(item)} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 cursor-pointer hover:border-indigo-500 transition-colors">
                                    <div className="h-32 bg-gray-100 rounded-lg mb-3 flex items-center justify-center overflow-hidden">
                                        {item.fotoMenu || item.image ? <img src={item.fotoMenu || item.image} className="object-cover w-full h-full" alt={item.name} /> : <Icon name="image" className="text-gray-400" />}
                                    </div>
                                    <h4 className="font-semibold text-gray-800 text-sm line-clamp-2">{item.name}</h4>
                                    <p className="text-indigo-600 font-bold mt-1">Rp {item.price.toLocaleString()}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="w-full lg:w-96 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
                        <div className="p-4 border-b border-gray-200">
                            <h3 className="font-bold text-lg">Keranjang Kasir</h3>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {cart.length === 0 ? <p className="text-center text-gray-500 text-sm mt-10">Keranjang kosong</p> : cart.map(item => (
                                <div key={item.id} className="flex justify-between items-center">
                                    <div>
                                        <p className="text-sm font-medium text-gray-800">{item.name}</p>
                                        <p className="text-xs text-gray-500">{item.qty} x Rp {item.price.toLocaleString()}</p>
                                    </div>
                                    <div className="flex items-center space-x-3">
                                        <span className="text-sm font-bold text-gray-900">Rp {(item.qty * item.price).toLocaleString()}</span>
                                        <button onClick={() => removeFromCart(item.id)} className="text-red-500 hover:text-red-700"><Icon name="x-circle" className="w-5 h-5" /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t border-gray-200 bg-gray-50 rounded-b-xl">
                            <div className="flex justify-between mb-4">
                                <span className="font-semibold text-gray-600">Total</span>
                                <span className="font-bold text-xl text-indigo-600">Rp {total.toLocaleString()}</span>
                            </div>
                            <button onClick={handleCheckout} disabled={cart.length === 0} className="w-full py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 disabled:opacity-50">
                                Proses Pembayaran
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function MenuView({ menu }) {
            const [showModal, setShowModal] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const { db, collection, addDoc, updateDoc, doc, deleteDoc, serverTimestamp } = window.fb;

            const [formData, setFormData] = useState({ name: '', price: '', category: 'Makanan', isAvailable: true, description: '', fotoMenu: '' });
            const [imgError, setImgError] = useState('');
            const [isValidImage, setIsValidImage] = useState(false);

            const handleImageChange = (e) => {
                const url = e.target.value;
                setFormData({...formData, fotoMenu: url});
                setImgError('');
                setIsValidImage(false);
                
                if(url) {
                    const img = new Image();
                    img.onload = () => setIsValidImage(true);
                    img.onerror = () => {
                        setIsValidImage(false);
                        setImgError('Link gambar tidak valid, gunakan direct image URL dari ImgBB');
                    };
                    img.src = url;
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (formData.fotoMenu && !isValidImage) {
                    setImgError('Link gambar tidak valid, gunakan direct image URL dari ImgBB');
                    return;
                }
                const data = { ...formData, price: Number(formData.price) };
                if (editingItem) {
                    await updateDoc(doc(db, 'menu', editingItem.id), data);
                } else {
                    await addDoc(collection(db, 'menu'), { ...data, createdAt: serverTimestamp() });
                }
                setShowModal(false);
                setEditingItem(null);
            };

            const handleDelete = async (id) => {
                if(confirm('Hapus menu ini?')) await deleteDoc(doc(db, 'menu', id));
            };

            const openEdit = (item) => {
                setEditingItem(item);
                const initFoto = item.fotoMenu || item.image || '';
                setFormData({ name: item.name, price: item.price, category: item.category || 'Makanan', isAvailable: item.isAvailable, description: item.description || '', fotoMenu: initFoto });
                setImgError('');
                
                if (initFoto) {
                    const img = new Image();
                    img.onload = () => setIsValidImage(true);
                    img.onerror = () => {
                        setIsValidImage(false);
                    };
                    img.src = initFoto;
                } else {
                    setIsValidImage(false);
                }

                setShowModal(true);
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-end">
                        <button onClick={() => { setEditingItem(null); setFormData({ name: '', price: '', category: 'Makanan', isAvailable: true, description: '', fotoMenu: '' }); setImgError(''); setIsValidImage(false); setShowModal(true); }} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium flex items-center">
                            <Icon name="plus" className="w-4 h-4 mr-2" /> Tambah Menu
                        </button>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Menu</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Kategori</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Harga</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-200">
                                {menu.map(item => (
                                    <tr key={item.id}>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{item.name}</td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{item.category}</td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Rp {item.price.toLocaleString()}</td>
                                        <td className="px-6 py-4 whitespace-nowrap">
                                            <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${item.isAvailable ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                                {item.isAvailable ? 'Tersedia' : 'Habis'}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                            <button onClick={() => openEdit(item)} className="text-indigo-600 hover:text-indigo-900 mr-4">Edit</button>
                                            <button onClick={() => handleDelete(item.id)} className="text-red-600 hover:text-red-900">Hapus</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
                                <h3 className="text-lg font-bold mb-4">{editingItem ? 'Edit Menu' : 'Tambah Menu Baru'}</h3>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700">Nama Menu</label>
                                        <input type="text" required className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700">Harga (Rp)</label>
                                        <input type="number" required className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700">Kategori</label>
                                        <select className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                            <option>Makanan</option>
                                            <option>Minuman</option>
                                            <option>Tambahan</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700">Deskripsi</label>
                                        <textarea className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" rows="2" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})}></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700">Foto Menu (Link ImgBB)</label>
                                        <input type="url" placeholder="https://i.ibb.co/..." className={`mt-1 w-full px-3 py-2 border ${imgError ? 'border-red-500' : 'border-gray-300'} rounded-lg`} value={formData.fotoMenu} onChange={handleImageChange} />
                                        {imgError && <p className="text-xs text-red-500 mt-1">{imgError}</p>}
                                        {formData.fotoMenu && isValidImage && (
                                            <div className="mt-2 h-32 bg-gray-100 rounded-lg overflow-hidden flex items-center justify-center border border-gray-200">
                                                <img src={formData.fotoMenu} alt="Preview" className="object-cover h-full w-full" />
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex items-center">
                                        <input type="checkbox" className="h-4 w-4 text-indigo-600" checked={formData.isAvailable} onChange={e => setFormData({...formData, isAvailable: e.target.checked})} />
                                        <label className="ml-2 block text-sm text-gray-900">Tersedia</label>
                                    </div>
                                    <div className="flex justify-end space-x-3 mt-6">
                                        <button type="button" onClick={() => setShowModal(false)} className="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Batal</button>
                                        <button type="submit" disabled={formData.fotoMenu && !isValidImage} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50">Simpan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function HistoryView({ orders, transactions }) {
            const allHistory = [...orders.filter(o => o.status === 'selesai' || o.status === 'ditolak'), ...transactions].sort((a,b) => b.createdAt?.toMillis() - a.createdAt?.toMillis());
            
            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table className="min-w-full divide-y divide-gray-200">
                        <thead className="bg-gray-50">
                            <tr>
                                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal</th>
                                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipe</th>
                                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            </tr>
                        </thead>
                        <tbody className="bg-white divide-y divide-gray-200">
                            {allHistory.map(item => (
                                <tr key={item.id}>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{item.createdAt ? new Date(item.createdAt.toDate()).toLocaleString() : '-'}</td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{item.customerName ? `Online (${item.customerName})` : 'Kasir Offline'}</td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Rp {item.total?.toLocaleString()}</td>
                                    <td className="px-6 py-4 whitespace-nowrap">
                                        <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${item.status === 'ditolak' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                                            {item.status || 'selesai'}
                                        </span>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function ReportsView({ transactions, orders }) {
            const completedOnline = orders.filter(o => o.status === 'selesai');
            const totalRevenue = transactions.reduce((sum, t) => sum + (t.total || 0), 0) + completedOnline.reduce((sum, o) => sum + (o.total || 0), 0);
            const totalTrans = transactions.length + completedOnline.length;

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 className="text-lg font-bold mb-4">Ringkasan Laporan</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="p-4 bg-indigo-50 rounded-lg">
                                <p className="text-sm text-indigo-600 font-medium">Total Pemasukan Keseluruhan</p>
                                <h4 className="text-2xl font-bold text-indigo-900 mt-1">Rp {totalRevenue.toLocaleString()}</h4>
                            </div>
                            <div className="p-4 bg-green-50 rounded-lg">
                                <p className="text-sm text-green-600 font-medium">Total Transaksi Selesai</p>
                                <h4 className="text-2xl font-bold text-green-900 mt-1">{totalTrans}</h4>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function SettingsView({ settings }) {
            const [formData, setFormData] = useState(settings || {});
            const { db, doc, updateDoc } = window.fb;

            useEffect(() => { setFormData(settings); }, [settings]);

            const handleSave = async (e) => {
                e.preventDefault();
                await updateDoc(doc(db, 'settings', 'store'), formData);
                alert('Pengaturan disimpan!');
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8 max-w-2xl">
                    <h3 className="text-lg font-bold mb-6">Pengaturan Toko</h3>
                    <form onSubmit={handleSave} className="space-y-6">
                        <div>
                            <label className="block text-sm font-medium text-gray-700">Nama Usaha</label>
                            <input type="text" className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" value={formData.storeName || ''} onChange={e => setFormData({...formData, storeName: e.target.value})} />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700">Nomor WhatsApp</label>
                            <input type="text" className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" value={formData.whatsapp || ''} onChange={e => setFormData({...formData, whatsapp: e.target.value})} />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700">Alamat Usaha</label>
                            <textarea className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" rows="3" value={formData.address || ''} onChange={e => setFormData({...formData, address: e.target.value})}></textarea>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700">Jam Buka</label>
                            <input type="text" className="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg" value={formData.openingHours || ''} onChange={e => setFormData({...formData, openingHours: e.target.value})} />
                        </div>
                        <div className="flex items-center mt-4">
                            <input type="checkbox" className="h-5 w-5 text-indigo-600 rounded" checked={formData.isOpen || false} onChange={e => setFormData({...formData, isOpen: e.target.checked})} />
                            <label className="ml-3 block text-sm font-medium text-gray-900">Toko Sedang Buka</label>
                        </div>
                        <div className="pt-4 border-t border-gray-200">
                            <button type="submit" className="px-6 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700">Simpan Pengaturan</button>
                        </div>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
